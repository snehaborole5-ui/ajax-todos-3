<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-success font-weight-bold">Task Manager</h2>
            <button id="toggleFormBtn" class="btn btn-danger d-flex align-items-center">
                <svg class="mr-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add New Todo
            </button>
        </div>

        <div id="formWrapper" class="form-wrapper mb-4">
            <div class="card card-body shadow-sm">
                <form id="todoForm">
                    <div class="row">
                        <div class="col-md-5 form-group">
                            <label for="title" class="font-weight-bold">Todo Title*</label>
                            <input type="text" id="title" class="form-control" placeholder="Enter Title..." required>
                        </div>
                        <div class="col-md-3 form-group">
                            <label for="userId" class="font-weight-bold">User ID*</label>
									<select id="userId" class="form-control" required>
                               			 <option value="1">1</option>
                                		 <option value="2">2</option>
                                		 <option value="3">3</option>
                                		 <option value="4">4</option>
                                		 <option value="5">5</option>
                                		 <option value="6">6</option>
                                		 <option value="7">7</option>
                                		 <option value="8">8</option>
                                		 <option value="9">9</option>
                                		 <option value="10">10</option>
                            		</select>
                        </div>
                        <div class="col-md-4 form-group">
                            <label for="completed" class="font-weight-bold">Status*</label>
                            <select id="completed" class="form-control">
                                <option value="false">Pending</option>
                                <option value="true">Completed</option>
                            </select>
                        </div>
                    </div>
                    <div class="text-right mt-2">
                        <button type="button" id="cancelBtn" class="btn btn-secondary mr-2">Cancel</button>
                        <button type="submit" id="addTodoBtn" class="btn btn-success">Save Todo</button>
                        <button type="button" id="updateTodoBtn" class="btn btn-warning d-none">Update Todo</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="thead-dark">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Edit</th>
                            <th class="text-center">Delete</th>
                        </tr>
                    </thead>
                    <tbody id="todoContainer">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="spinner" class="spinner-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
